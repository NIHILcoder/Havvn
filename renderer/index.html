<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Inter is bundled (self-hosted via @fontsource), not loaded from a CDN —
       the production CSP blocks fonts.googleapis.com. -->
  <title>Havvn</title>
  <style>
    /* Startup splash — inlined so it paints in the very first frame, before the
       app bundle parses. Ember: graphite ground, ember mark. The dismiss logic
       lives in the bundle (renderer/utils/splash.ts), NOT an inline <script>,
       because the production CSP (script-src 'self') blocks inline JS. */
    #th-splash {
      position: fixed; inset: 0; z-index: 99999;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 34px;
      background: #141519;
      color: #ECEBE6;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      transition: opacity .5s ease;
    }
    #th-splash.th-splash-out { opacity: 0; pointer-events: none; }

    .th-stage { position: relative; width: 180px; height: 180px; display: grid; place-items: center; }

    /* Soft drifting ember glow behind everything */
    .th-glow {
      position: absolute; width: 240px; height: 240px; border-radius: 50%;
      background: radial-gradient(circle, rgba(242,145,63,.16) 0%, transparent 62%);
      filter: blur(8px);
      animation: th-drift 9s ease-in-out infinite alternate;
    }

    /* Expanding "sonar" rings — peers radiating outward from the haven */
    .th-sonar {
      position: absolute; width: 84px; height: 84px; border-radius: 50%;
      border: 1.5px solid rgba(242,145,63,.45);
      opacity: 0;
      animation: th-sonar 2.8s cubic-bezier(.22,1,.36,1) infinite;
    }
    .th-sonar.s2 { animation-delay: .95s; }
    .th-sonar.s3 { animation-delay: 1.9s; }

    /* The bare Double-V mark, gently floating */
    .th-tile {
      position: relative; z-index: 1;
      width: 72px; height: 72px;
      display: grid; place-items: center;
      animation: th-float 4.5s ease-in-out infinite;
    }
    .th-tile svg { width: 64px; height: auto; }

    .th-word {
      font-size: 18px; font-weight: 600; letter-spacing: .4px;
      opacity: 0; transform: translateY(8px);
      animation: th-rise .7s cubic-bezier(.22,1,.36,1) .15s forwards;
    }
    .th-word b { font-weight: 600; color: #F2913F; }

    @keyframes th-sonar {
      0%   { opacity: .5;  transform: scale(.7); }
      70%  { opacity: 0;   transform: scale(1.9); }
      100% { opacity: 0;   transform: scale(1.9); }
    }
    @keyframes th-float {
      0%, 100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-7px) scale(1.03); }
    }
    @keyframes th-drift {
      from { transform: translate(-16px, -10px) scale(1); }
      to   { transform: translate(16px, 12px) scale(1.12); }
    }
    @keyframes th-rise { to { opacity: 1; transform: translateY(0); } }

    /* A light band sweeps the mark every few seconds (clipped to its shape). */
    .th-glint {
      transform: translateX(-190px) skewX(-16deg);
      animation: th-glint-sweep 3.2s cubic-bezier(.4,0,.2,1) 0.6s infinite;
    }
    @keyframes th-glint-sweep {
      0%   { transform: translateX(-190px) skewX(-16deg); }
      38%  { transform: translateX(880px) skewX(-16deg); }
      100% { transform: translateX(880px) skewX(-16deg); }
    }

    @media (prefers-reduced-motion: reduce) {
      .th-glow, .th-sonar, .th-tile { animation: none; }
      .th-glint { animation: none; }
      .th-sonar { opacity: .18; }
      .th-sonar.s2, .th-sonar.s3 { display: none; }
      .th-word { animation: none; opacity: 1; transform: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <div id="th-splash" role="status" aria-label="Loading Havvn">
    <div class="th-stage">
      <span class="th-glow"></span>
      <span class="th-sonar"></span>

          </g>
          <g clip-path="url(#th-mark-clip)">
            <rect class="th-glint" x="-180" y="-30" width="180" height="356" fill="url(#th-mark-glint)"/>
          </g>
        </svg>
      </span>
    </div>
    <div class="th-word">Ha<b>vv</b>n</div>
  </div>
</body>
</html>
